<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NI Stack — 3D Natural Intelligence Flythrough</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050a12;
        font-family: "Inter", sans-serif;
        color: #f0f4f8;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #phase-label {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #2dd4bf;
        text-shadow: 0 0 30px rgba(45, 212, 191, 0.5);
        z-index: 20;
        pointer-events: none;
        white-space: nowrap;
      }
      #layer-count {
        position: fixed;
        top: 36px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.6rem;
        color: #64748b;
        z-index: 20;
        pointer-events: none;
        letter-spacing: 1px;
      }
      #close-btn {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 30;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.25);
        color: #ef4444;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 0.85rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
      }
      #close-btn:hover {
        background: rgba(239, 68, 68, 0.4);
        transform: scale(1.1);
      }
      #info-panel {
        position: fixed;
        right: 12px;
        top: 54px;
        width: 320px;
        max-height: calc(100vh - 70px);
        overflow-y: auto;
        background: rgba(10, 15, 30, 0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(45, 212, 191, 0.15);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
          inset 0 0 40px rgba(45, 212, 191, 0.05);
        border-radius: 16px;
        padding: 24px;
        z-index: 20;
        opacity: 0;
        transform: translateX(20px);
        transition: all 0.35s;
        scrollbar-width: thinner;
        scrollbar-color: rgba(45, 212, 191, 0.2) transparent;
      }
      #info-panel.visible {
        opacity: 1;
        transform: translateX(0);
      }
      #info-panel h3 {
        font-size: 0.9rem;
        margin-bottom: 4px;
      }
      #info-panel .domain {
        font-size: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      #info-panel .badge {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 0.5rem;
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      #info-panel p {
        font-size: 0.75rem;
        line-height: 1.5;
        color: #94a3b8;
      }
      #info-panel .status-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        font-size: 0.6rem;
        font-weight: 700;
      }
      #info-panel .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
      }
      #info-panel .claim {
        margin-top: 8px;
        background: rgba(251, 191, 36, 0.06);
        border: 1px solid rgba(251, 191, 36, 0.15);
        border-radius: 5px;
        padding: 5px 8px;
        font-size: 0.6rem;
        color: #fbbf24;
        font-weight: 600;
      }
      #info-panel .file {
        margin-top: 6px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.55rem;
        color: #94a3b8;
      }
      #prompt-panel {
        position: fixed;
        left: 12px;
        top: 54px;
        width: 330px;
        max-height: calc(100vh - 70px);
        overflow-y: auto;
        background: rgba(10, 15, 30, 0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(45, 212, 191, 0.15);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
          inset 0 0 40px rgba(45, 212, 191, 0.05);
        border-radius: 16px;
        padding: 24px;
        z-index: 50;
        opacity: 0;
        transform: translateX(-20px);
        transition: all 0.35s;
        scrollbar-width: thinner;
      }
      #prompt-panel.visible {
        opacity: 1;
        transform: translateX(0);
      }
      #prompt-panel h3 {
        font-size: 0.8rem;
        color: #2dd4bf;
        margin-bottom: 10px;
      }
      #prompt-panel .stage {
        margin-bottom: 8px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        background: rgba(255, 255, 255, 0.015);
      }
      #prompt-panel .stage-title {
        font-size: 0.55rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }
      #prompt-panel .stage-text {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.65rem;
        color: #94a3b8;
        line-height: 1.4;
        word-break: break-all;
      }
      #prompt-panel .flag {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 0.5rem;
        font-weight: 700;
        margin: 2px;
      }
      #prompt-panel .flag.block {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }
      #prompt-panel .flag.pass {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
      }
      #legend {
        position: fixed;
        left: 12px;
        top: 36px; /* Moved from bottom left to top left */
        z-index: 20;
        display: flex;
        flex-direction: column;
        background: rgba(5, 10, 25, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: all 0.3s ease;
        overflow: hidden;
      }
      #legend-header {
        padding: 8px 12px;
        font-size: 0.6rem;
        font-weight: 800;
        color: #94a3b8;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        user-select: none;
        gap: 8px;
      }
      #legend-header:hover {
        background: rgba(255, 255, 255, 0.05);
        color: #e2e8f0;
      }
      #legend-content {
        display: flex;
        flex-direction: column;
        gap: 1px;
        max-height: calc(100vh - 120px);
        overflow-y: auto;
        padding: 4px 6px;
        transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
      }
      #legend.collapsed #legend-content {
        max-height: 0;
        padding: 0 6px;
        opacity: 0;
      }
      #legend .section {
        font-size: 0.45rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 3px 6px;
        margin-top: 3px;
      }
      #legend .item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.5rem;
        color: #94a3b8;
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 4px;
        transition: all 0.12s;
        white-space: nowrap;
      }
      #legend .item:hover {
        background: rgba(255, 255, 255, 0.04);
        color: #e2e8f0;
      }
      #legend .item.active {
        color: #f0f4f8;
        background: rgba(45, 212, 191, 0.08);
      }
      #legend .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      #hint {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.25);
        font-size: 0.55rem;
        z-index: 20;
        animation: pulse 2.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.2;
        }
        50% {
          opacity: 0.7;
        }
      }
      #phase-tabs {
        position: fixed;
        top: 10px;
        left: 12px;
        z-index: 25;
        display: flex;
        gap: 3px;
      }
      #phase-tabs button {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #475569;
        padding: 3px 10px;
        border-radius: 5px;
        font-size: 0.5rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      #test-controls {
        position: fixed;
        top: 10px;
        right: 50px;
        z-index: 25;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      #test-controls select,
      #test-controls button {
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #94a3b8;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 0.55rem;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
      }
      #test-controls select:hover,
      #test-controls button:hover {
        border-color: rgba(45, 212, 191, 0.3);
        color: #e2e8f0;
      }
      #test-controls select:focus {
        outline: none;
        border-color: #2dd4bf;
      }
      #test-controls .label {
        font-size: 0.45rem;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 800;
      }
      #run-btn {
        background: rgba(16, 185, 129, 0.15) !important;
        border-color: rgba(16, 185, 129, 0.3) !important;
        color: #10b981 !important;
        font-weight: 800 !important;
        padding: 4px 14px !important;
      }
      #run-btn:hover {
        background: rgba(16, 185, 129, 0.3) !important;
      }
      #run-btn.running {
        background: rgba(239, 68, 68, 0.15) !important;
        border-color: rgba(239, 68, 68, 0.3) !important;
        color: #ef4444 !important;
      }
      #phase-tabs button.active {
        color: #fff;
        border-color: rgba(45, 212, 191, 0.3);
      }
      .crt-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        background: linear-gradient(
            rgba(18, 16, 16, 0) 50%,
            rgba(0, 0, 0, 0.25) 50%
          ),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.05),
            rgba(0, 255, 0, 0.01),
            rgba(0, 0, 255, 0.05)
          );
        background-size: 100% 4px, 3px 100%;
        z-index: 100;
        opacity: 0.5;
      }
      .vignette {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        background: radial-gradient(
          circle,
          rgba(0, 0, 0, 0) 60%,
          rgba(0, 0, 0, 0.7) 100%
        );
        z-index: 101;
      }
    </style>
  </head>
  <body>
    <div class="crt-overlay"></div>
    <div class="vignette"></div>
    <canvas id="scene"></canvas>
    <div id="phase-label">NI Stack — Living Ecosystem</div>
    <div id="layer-count"></div>
    <button
      id="close-btn"
      onclick="window.parent.postMessage('closeFlythrough','*')"
      title="Back to Dashboard"
    >
      ✕
    </button>
    <div id="phase-tabs">
      <button class="active" onclick="setPhase('all')">🌿 ALL</button>
      <button onclick="setPhase('shield')">🛡️ SHIELD</button>
      <button onclick="setPhase('compress')">🐚 COMPRESS</button>
      <button onclick="setPhase('audit')">🐬 AUDIT</button>
    </div>
    <div id="test-controls">
      <span class="label">Scenario</span>
      <select id="scenario-select">
        <option value="mixed">🎯 Mixed (Benign + Attack)</option>
        <option value="advbench">🔴 AdvBench-520 (Full Attack)</option>
        <option value="boiling">🐸 Boiling Frog (Multi-Turn)</option>
        <option value="crescendo">📈 Crescendo Drift</option>
        <option value="pliny">🏴‍☠️ Pliny L1B3RT45</option>
        <option value="twain">✍️ Twain Syntactic</option>
        <option value="benign">🟢 Benign Only</option>
      </select>
      <span class="label">FLM</span>
      <select id="flm-select">
        <option value="ollama-mistral">🦙 Ollama Mistral 7B</option>
        <option value="ollama-llama3">🦙 Ollama LLaMA 3.1</option>
        <option value="ollama-phi3">💻 Ollama Phi-3 Mini</option>
      </select>
      <button id="run-btn" onclick="toggleTest()">▶ RUN</button>
    </div>
    <div
      id="energy-mode-toggle"
      style="
        position: fixed;
        top: 70px;
        right: 12px;
        z-index: 20;
        background: rgba(10, 15, 30, 0.85);
        border: 1px solid rgba(45, 212, 191, 0.2);
        padding: 10px;
        border-radius: 12px;
        backdrop-filter: blur(8px);
        display: flex;
        flex-direction: column;
        gap: 8px;
      "
    >
      <div
        style="
          font-size: 0.6rem;
          font-weight: 800;
          color: #2dd4bf;
          text-transform: uppercase;
          letter-spacing: 1px;
          text-align: center;
        "
      >
        Energy Cost Mode
      </div>
      <div style="display: flex; gap: 6px">
        <button
          id="btn-mode-ni"
          onclick="setEnergyMode('ni')"
          style="
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
          "
        >
          🌿 NI Stack
        </button>
        <button
          id="btn-mode-llm"
          onclick="setEnergyMode('llm')"
          style="
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
          "
        >
          ☢️ LLM-as-a-Judge
        </button>
      </div>
    </div>
    <div id="info-panel">
      <div class="domain"></div>
      <h3></h3>
      <div class="badge"></div>
      <p></p>
      <div class="status-row">
        <div class="status-dot"></div>
        <span></span>
      </div>
      <div class="claim"></div>
      <div class="file"></div>
    </div>
    <div id="prompt-panel">
      <h3>⟡ Prompt Inspector</h3>
      <div id="prompt-stages"></div>
    </div>
    <div id="legend"></div>
    <div id="hint">
      ⟡ Hover prompts to slow · Click to inspect · Click nodes to learn ⟡
    </div>

    <script src="js/flythrough-layers.js?v=39"></script>
    <script>
      "use strict";

      var energyMode = "ni";
      function setEnergyMode(mode) {
        energyMode = mode;
        document.getElementById("btn-mode-ni").style.background =
          mode === "ni" ? "rgba(16,185,129,0.2)" : "rgba(255,255,255,0.05)";
        document.getElementById("btn-mode-ni").style.borderColor =
          mode === "ni" ? "#10b981" : "rgba(255,255,255,0.1)";
        document.getElementById("btn-mode-ni").style.color =
          mode === "ni" ? "#10b981" : "#94a3b8";

        document.getElementById("btn-mode-llm").style.background =
          mode === "llm" ? "rgba(239,68,68,0.2)" : "rgba(255,255,255,0.05)";
        document.getElementById("btn-mode-llm").style.borderColor =
          mode === "llm" ? "#ef4444" : "rgba(255,255,255,0.1)";
        document.getElementById("btn-mode-llm").style.color =
          mode === "llm" ? "#ef4444" : "#94a3b8";
      }

      var totalBlockedEver = 0;
      var bottomPlanted = []; // { x, type, stage }

      var PHI = 1.618033988749;
      var canvas = document.getElementById("scene");
      var ctx = canvas.getContext("2d");
      var W,
        H,
        activeMouseX = 0.5,
        activeMouseY = 0.5,
        mouseX = 0.5,
        mouseY = 0.5,
        selectedLayer = null,
        selectedPrompt = null,
        hoveredPromptIdx = -1;
      var activePhase = "all";

      var stars = [];
      for (var si = 0; si < 400; si++) {
        stars.push({
          x: Math.random() * 8000 - 4000,
          y: Math.random() * 4000 - 2000,
          z: Math.random() * 3 + 1.2,
          alpha: Math.random() * 0.4 + 0.05,
        });
      }

      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var audioEnabled = false;
      window.addEventListener("click", function () {
        if (audioCtx.state === "suspended") audioCtx.resume();
        audioEnabled = true;
      });

      function playSolfeggio(freq, duration, type, vol) {
        if (!audioEnabled || audioCtx.state !== "running") return;
        var osc = audioCtx.createOscillator();
        var gainNode = audioCtx.createGain();
        osc.connect(gainNode);

        // Add a bit of reverb/delay by using a lowpass filter
        var filter = audioCtx.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = freq * 2;
        gainNode.connect(filter);
        filter.connect(audioCtx.destination);

        var now = audioCtx.currentTime;
        osc.type = type || "sine";
        osc.frequency.setValueAtTime(freq, now);

        // Soft Attack, Long Release (Crystal/Singing Bowl style envelope)
        var maxVol = vol || 0.05;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(
          maxVol,
          now + Math.min(0.2, duration * 0.1),
        );
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc.start(now);
        osc.stop(now + duration + 0.1);
      }

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);
      window.addEventListener("mousemove", function (e) {
        activeMouseX = e.clientX;
        activeMouseY = e.clientY;
        mouseX = e.clientX / W;
        mouseY = e.clientY / H;
      });

      // Layer count display
      document.getElementById("layer-count").textContent =
        WIRED_COUNT +
        " WIRED · " +
        DEAD_COUNT +
        " PLANNED · " +
        TOTAL_COUNT +
        " TOTAL · " +
        Object.keys(KD_GROUPS).length +
        " KNOWLEDGE DOMAINS";

      // Activity state
      var layerActivity = {};
      ALL_LAYERS.forEach(function (l) {
        layerActivity[l.id] = { active: false, intensity: 0, lastTrigger: 0 };
      });

      function simulateActivity() {
        var now = Date.now();
        ALL_LAYERS.forEach(function (l) {
          if (!l.wired) return; // Dead layers never activate
          var act = layerActivity[l.id];
          if (act.active) {
            act.intensity = Math.max(0.1, 1.0 - (now - act.lastTrigger) / 3000);
            if (act.intensity <= 0.1) act.active = false;
          }
        });
      }

      var targetZoom = 1.0,
        currentZoom = 1.0;
      var targetPanX = 0,
        currentPanX = 0;
      var targetPanY = 0,
        currentPanY = 0;

      // Position layers: dynamic layout supporting rings and matrix pipelines
      function updateLayoutTargets() {
        var vScale = Math.min(W / 1200, H / 800) * 1.35; // increased global scaling to use more screen
        var isShieldMatrix = activePhase === "shield";

        var phases = {
          shield: { cx: -0.26, layers: [] },
          compress: { cx: 0.08, layers: [] },
          audit: { cx: 0.35, layers: [] },
        };
        ALL_LAYERS.forEach(function (l) {
          if (phases[l.phase]) phases[l.phase].layers.push(l);
        });

        Object.keys(phases).forEach(function (pKey) {
          var p = phases[pKey];
          var layers = p.layers;
          var count = layers.length;
          layers.sort(function (a, b) {
            return (a.group + a.id).localeCompare(b.group + b.id);
          });

          if (isShieldMatrix && pKey === "shield") {
            // Nagelbrett / 18D Matrix Pipeline Layout for SHIELD
            var groupCols = {
              constitutional: 0,
              memory: 1,
              persona: 2,
              intent: 3,
              social_eng: 4,
              encoding: 5,
              twain: 6,
              forensics: 7,
              physics: 8,
              waves: 9,
              biomimicry: 10,
              game_theory: 11,
              v2_cascade: 12,
              pqc: 13,
              dead: 14,
            };

            var colCounts = {};
            // Group layers by their pipeline column
            layers.forEach(function (l) {
              var c =
                groupCols[l.group] !== undefined ? groupCols[l.group] : 14;
              if (!colCounts[c]) colCounts[c] = 0;
              l._col = c;
              l._pipeCol = c; // Save for pipeline drawing
              l._row = colCounts[c]++;
            });

            layers.forEach(function (l) {
              var totalCols = Object.keys(colCounts).length || 15;
              var usableW = W * 0.92; // Use 92% of screen width
              var colW = usableW / totalCols;
              var startX = -usableW / 2 + colW / 2; // Center the grid

              l._tRelX = startX + l._col * colW;
              var rowHeight = Math.max(36, 44 * vScale);

              // Rigid Nagel-Brett: top-aligned uniform grid.
              // All columns start from the same top offset.
              var maxRows = 0;
              Object.keys(colCounts).forEach(function (k) {
                if (colCounts[k] > maxRows) maxRows = colCounts[k];
              });
              l._tRelY = (l._row - maxRows / 2) * rowHeight + 60;
              l._tPcx = 0; // Center on screen (no phase offset)
            });
          } else {
            // Classic Radial Layout

          var qp = quantumPairs[i];
          qp.life -= 0.02;
          if (qp.life <= 0) {
            quantumPairs.splice(i, 1);
            continue;
          }
          ctx.globalAlpha = qp.life;
          var t = 1.0 - qp.life;
          ctx.strokeStyle = "rgba(16, 185, 129, " + qp.life + ")"; // Green QFAI
          ctx.lineWidth = 1;
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          ctx.moveTo(qp.x1, qp.y1);
          ctx.lineTo(qp.x2, qp.y2);
          ctx.stroke();
          ctx.setLineDash([]);

          ctx.fillStyle = "#34d399";
          ctx.beginPath();
          ctx.arc(qp.x1, qp.y1, 2 + t * 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(qp.x2, qp.y2, 2 + t * 3, 0, Math.PI * 2);
          ctx.fill();
        }

        // 8. Event Horizon
        for (var i = eventHorizons.length - 1; i >= 0; i--) {
          var eh = eventHorizons[i];
          eh.life -= 0.015;
          eh.radius += (60 - eh.radius) * 0.1;
          if (eh.life <= 0) {
            eventHorizons.splice(i, 1);
            continue;
          }
          ctx.globalAlpha = eh.life * 0.9;

          var grd = ctx.createRadialGradient(
            eh.x,
            eh.y,
            0,
            eh.x,
            eh.y,
            eh.radius,
          );
          grd.addColorStop(0, "rgba(0,0,0,1)");
          grd.addColorStop(0.5, "rgba(251,191,36,0.3)"); // LLM Gold color
          grd.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(eh.x, eh.y, eh.radius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(251,191,36, " + eh.life + ")";
          ctx.beginPath();
          ctx.arc(eh.x, eh.y, eh.radius * 0.5, 0, Math.PI * 2);
          ctx.stroke();
        }

        // 9. Butterfly Effect
        for (var i = butterflies.length - 1; i >= 0; i--) {
          var bf = butterflies[i];
          bf.life -= 0.005;
          bf.flap += 0.5;
          bf.x += bf.vx;
          bf.y += bf.vy;
          if (bf.life <= 0) {
            butterflies.splice(i, 1);
            continue;
          }
          ctx.globalAlpha = bf.life;
          ctx.font = "24px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.save();
          ctx.translate(bf.x, bf.y);
          ctx.scale(Math.abs(Math.sin(bf.flap)), 1); // Flapping effect
          ctx.fillText("🦋", 0, 0);
          ctx.restore();

          // Wind gust ripple across entire screen based on life
          if (bf.life > 0.8) {
            var r = (1.0 - bf.life) * 4000;
            ctx.strokeStyle = "rgba(255, 255, 255, " + (bf.life - 0.8) + ")";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(bf.x, bf.y, r, 0, Math.PI * 2);
            ctx.stroke();
          }
        }

        // 10. Optical Prism (Spectroscopy)
        for (var i = prisms.length - 1; i >= 0; i--) {
          var pr = prisms[i];
          pr.life -= 0.015;
          pr.scale += (1 - pr.scale) * 0.1;
          if (pr.life <= 0) {
            prisms.splice(i, 1);
            continue;
          }
          ctx.globalAlpha = pr.life;
          var s = 30 * pr.scale;
          // Prism Glass Triangle
          ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
          ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(pr.x, pr.y - s);
          ctx.lineTo(pr.x + s * 0.8, pr.y + s * 0.8);
          ctx.lineTo(pr.x - s * 0.8, pr.y + s * 0.8);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          // White light entering
          ctx.strokeStyle = "white";
          ctx.beginPath();
          ctx.moveTo(pr.x - s * 2, pr.y);
          ctx.lineTo(pr.x - s * 0.4, pr.y);
          ctx.stroke();

          // Rainbow exiting
          var colors = ["red", "orange", "yellow", "green", "blue", "violet"];
          for (var c = 0; c < colors.length; c++) {
            ctx.strokeStyle = colors[c];
            ctx.beginPath();
            ctx.moveTo(pr.x + s * 0.4, pr.y);
            ctx.lineTo(pr.x + s * 2, pr.y - s + c * ((s * 2) / 5));
            ctx.stroke();
          }
        }

        // 11. DNA Helix
        for (var i = dnaStrands.length - 1; i >= 0; i--) {
          var dna = dnaStrands[i];
          dna.life -= 0.01;
          dna.phase += 0.2;
          if (dna.life <= 0) {
            dnaStrands.splice(i, 1);
            continue;
          }
          ctx.globalAlpha = dna.life * 0.8;
          ctx.lineWidth = 2;
          for (var j = -20; j <= 20; j += 4) {
            var y1 = dna.y + Math.sin(dna.phase + j * 0.2) * 15;
            var y2 = dna.y + Math.sin(dna.phase + j * 0.2 + Math.PI) * 15;
            ctx.strokeStyle = "rgba(45, 212, 191, 0.4)";
            ctx.beginPath();
            ctx.moveTo(dna.x + j, y1);
            ctx.lineTo(dna.x + j, y2);
            ctx.stroke();
            ctx.fillStyle = "#34d399";
            ctx.beginPath();
            ctx.arc(dna.x + j, y1, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#60a5fa";
            ctx.beginPath();
            ctx.arc(dna.x + j, y2, 1.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // 12. Magnetic Field (SIREN Repulsion)
        for (var i = magneticFields.length - 1; i >= 0; i--) {
          var mf = magneticFields[i];
          mf.life -= 0.02;
          mf.radius += 5;
          if (mf.life <= 0) {
            magneticFields.splice(i, 1);
            continue;
          }
          ctx.globalAlpha = mf.life * 0.7;
          ctx.strokeStyle = "#8b5cf6";
          ctx.lineWidth = 1.5;
          for (var m = 1; m <= 3; m++) {
            ctx.beginPath();
            ctx.ellipse(
              mf.x - 20,
              mf.y,
              mf.radius * m * 0.3,
              mf.radius * m,
              0,
              -Math.PI / 2,
              Math.PI / 2,
              true,
            );
            ctx.stroke();
          }
        }

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }

      // ═══ BROADCAST CHANNEL: Cross-Dashboard Prompt Bridge ═══

        var baseLlm = activeScenario.includes("local") ? 850 : 420;

          shield: (0.18 + Math.random() * 0.15).toFixed(2), // based on 0.22ms avg benchmark
          compress: (1.2 + Math.random() * 0.4).toFixed(2), // φ-compression overhead

          idx: flowingPrompts.length,

      // Click
      canvas.addEventListener("click", function (e) {
        var mx = e.clientX,

          hit = false;
        for (var i = 0; i < flowingPrompts.length; i++) {
          var fp = flowingPrompts[i];
          if (Math.sqrt((mx - fp._sx) ** 2 + (my - fp._sy) ** 2) < fp._r + 10) {
            selectedPrompt = selectedPrompt === i ? null : i;
            selectedLayer = null;
            hit = true;
            break;

        }
        if (!hit)
          ALL_LAYERS.forEach(function (l) {
            if (
              Math.sqrt((mx - l._sx) ** 2 + (my - l._sy) ** 2) < l._r + 6 &&
              l._alpha > 0.03

              selectedLayer = selectedLayer === l.id ? null : l.id;
              selectedPrompt = null;
              hit = true;
              if (l.wired) {
                var act = layerActivity[l.id];
                act.active = true;
                act.intensity = 1;
                act.lastTrigger = Date.now();

          selectedLayer = null;
          selectedPrompt = null;

        updatePanels();

      // Heartbeat (reused from SIREN showcase)
      function drawHeartbeat(t) {
        var x = W - 180,
          y = H - 40,
          w = 160,
          h = 30;
        ctx.strokeStyle = "rgba(239,68,68,0.25)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        for (var i = 0; i < w; i++) {
          var ph = (t * 0.03 + i * 0.08) % (Math.PI * 2),
            p = 0.08 * Math.exp(-Math.pow(ph - 0.8, 2) * 10),
            q = -0.05 * Math.exp(-Math.pow(ph - 1.4, 2) * 40),
            r = 0.3 * Math.exp(-Math.pow(ph - 1.6, 2) * 60),
            s = -0.08 * Math.exp(-Math.pow(ph - 1.8, 2) * 40),
            tw = 0.12 * Math.exp(-Math.pow(ph - 2.8, 2) * 8),
            v = 0.35 + p + q + r + s + tw;
          i === 0
            ? ctx.moveTo(x + i, y + h / 2 - v * h * 0.8)
            : ctx.lineTo(x + i, y + h / 2 - v * h * 0.8);
        }
        ctx.stroke();
      }

      // Render
      function render(t) {
        ctx.clearRect(0, 0, W, H);
        simulateActivity();
        // Spawn prompts when test is running
        if (testRunning) {
          promptSpawnTimer++;
          if (promptSpawnTimer % 60 === 0) spawnPrompt(); // ~1 per second
          // Live stats in header
          var flmName =
            document.getElementById("flm-select").selectedOptions[0]
              .textContent;
          document.getElementById("layer-count").textContent =
            WIRED_COUNT +
            " WIRED · " +
            DEAD_COUNT +
            " PLANNED · " +
            TOTAL_COUNT +
            " TOTAL │ " +
            flmName +
            " │ ✓" +
            totalPassed +
            " ✕" +
            totalBlocked +
            " (" +
            promptsSpawned +
            " sent)";
        }
        // Background
        var bg = ctx.createRadialGradient(
          W / 2,
          H / 2,
          0,
          W / 2,
          H / 2,
          W * 0.7,
        );
        bg.addColorStop(0, "#0a1628");
        bg.addColorStop(0.5, "#070e1a");
        bg.addColorStop(1, "#030508");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        currentZoom += (targetZoom - currentZoom) * 0.08;
        currentPanX += (targetPanX - currentPanX) * 0.08;

        var cx = W / 2,
          cy = H / 2,
          px = (mouseX - 0.5) * 40,
          py = (mouseY - 0.5) * 25;
        // Quantum Foam Parallax
        ctx.fillStyle = "#fff";
        for (var i = 0; i < stars.length; i++) {
          var st = stars[i];
          var sx = ((st.x + currentPanX / st.z + 8000) % 8000) - 4000;
          var baseAlpha = Math.max(
            0,
            st.alpha + Math.sin(t * 0.001 * (1 / st.z) + st.x) * 0.1,
          );
          ctx.globalAlpha = baseAlpha;
          ctx.beginPath();
          ctx.arc(
            cx + sx + px * (0.3 / st.z),
            cy + st.y + py * (0.3 / st.z),
            1.5 / Math.sqrt(st.z),
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        // Phase zone headers — top of screen, high contrast
        var headerY = 70;
        ctx.textAlign = "center";
        ctx.font = "800 22px Inter";
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = "#ef4444";
        ctx.fillText("🛡️ SHIELD", cx - W * 0.18, headerY);
        ctx.fillStyle = "#2dd4bf";
        ctx.fillText("🐚 COMPRESS", cx + W * 0.08, headerY);
        // LLM BLACK BOX between compress and audit
        ctx.globalAlpha = 0.4;
        ctx.font = "800 14px 'JetBrains Mono'";
        ctx.fillStyle = "#fbbf24";
        var bbx = cx + W * 0.19;
        ctx.fillText("⟐ LLM ⟐", bbx, headerY);
        ctx.strokeStyle = "rgba(251,191,36,0.25)";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.strokeRect(bbx - 35, headerY - 14, 70, 28);
        ctx.setLineDash([]);
        ctx.globalAlpha = 0.5;
        ctx.font = "800 22px Inter";
        ctx.fillStyle = "#7c3aed";
        ctx.fillText("🐬 AUDIT", cx + W * 0.3, headerY);
        // Flow arrows between headers
        ctx.globalAlpha = 0.6;
        ctx.font = "bold 24px serif";
        ctx.fillStyle = "#94a3b8";

          var bx = spx - bw / 2 - 8,
            by = spy + rSize + 8,
            bw2 = bw + 16,
            bh = 20,
            br = 4;
          ctx.beginPath();
          ctx.moveTo(bx + br, by);
          ctx.lineTo(bx + bw2 - br, by);
          ctx.quadraticCurveTo(bx + bw2, by, bx + bw2, by + br);
          ctx.lineTo(bx + bw2, by + bh - br);
          ctx.quadraticCurveTo(bx + bw2, by + bh, bx + bw2 - br, by + bh);
          ctx.lineTo(bx + br, by + bh);
          ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - br);
          ctx.lineTo(bx, by + br);
          ctx.quadraticCurveTo(bx, by, bx + br, by);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = spCol;
          ctx.fillText(badgeText, spx, spy + rSize + 18);
          // Connecting line to panel
          ctx.strokeStyle = spCol + "44";
          ctx.lineWidth = 1.2;
          ctx.setLineDash([4, 4]);
          ctx.beginPath();
          ctx.moveTo(spx, spy);
          ctx.lineTo(12 + 165, spy);
          ctx.stroke();
          ctx.setLineDash([]);
          // Live update
          updatePromptLive(sp, spPhase);
        }
        // Heartbeat
        drawHeartbeat(t);
        // Supernova particles (LLM hit effect)
        drawSupernovaParticles(ctx);
        // Scientific Animations (Mycelium, Golden Spiral, Bayesian Lightning)
        drawScientificAnimations(ctx);
        // Energy/Tree Visualizer at bottom
        drawBottomPlanted(ctx);

        // --- Magnifying Glass (Eye of Providence) ---
        if (activeMouseX > 0 && activeMouseY > 0) {
          ctx.strokeStyle = "rgba(45, 212, 191, 0.4)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(activeMouseX, activeMouseY, 80, 0, Math.PI * 2);
          ctx.stroke();
          // Inner glow
          ctx.fillStyle = "rgba(45, 212, 191, 0.03)";
          ctx.fill();
          // Crosshairs
          ctx.beginPath();
          ctx.moveTo(activeMouseX - 90, activeMouseY);
          ctx.lineTo(activeMouseX + 90, activeMouseY);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(activeMouseX, activeMouseY - 90);
          ctx.lineTo(activeMouseX, activeMouseY + 90);
          ctx.stroke();

          // Typing Effect if hovered
          if (hoveredPromptIdx >= 0 && flowingPrompts[hoveredPromptIdx]) {
            var hp = flowingPrompts[hoveredPromptIdx];
            var hpsx = cx + hp.x * currentZoom + px * 0.3 + currentPanX;
            var hpsy = cy + hp.y * currentZoom + py * 0.3;
            var text = hp.data.original || "UNKNOWN_DATA_NODE";
            if (text.length > 55) text = text.substring(0, 52) + "...";

            // Background blur pill for tooltip
            ctx.fillStyle = "rgba(5, 10, 20, 0.85)";
            ctx.fillRect(hpsx + 25, hpsy - 45, 300, 45);
            ctx.strokeStyle = "rgba(16, 185, 129, 0.5)";
            ctx.strokeRect(hpsx + 25, hpsy - 45, 300, 45);

            ctx.font = "11px 'JetBrains Mono', monospace";
            ctx.textAlign = "left";
            ctx.fillStyle = "rgba(16, 185, 129, 0.9)";
            ctx.fillText("> " + text, hpsx + 35, hpsy - 28);

            ctx.font = "9px 'JetBrains Mono', monospace";
            ctx.fillStyle = "rgba(16, 185, 129, 0.5)";
            var hexBytes = Array.from(text)
              .map(function (c) {
                return c.charCodeAt(0).toString(16).padStart(2, "0");
              })
              .join(" ")
              .substring(0, 45);
            ctx.fillText("RAW_HEX: " + hexBytes, hpsx + 35, hpsy - 12);
          }
        }

        requestAnimationFrame(render);
      }

      function drawBottomPlanted(ctx) {
        if (bottomPlanted.length === 0) return;
        ctx.globalAlpha = 0.9;

        // Dynamic bottom bar with glow based on mode
        var modeColor =
          energyMode === "ni"
            ? "rgba(16,185,129,0.15)"
            : "rgba(239,68,68,0.15)";
        var modeStroke =
          energyMode === "ni" ? "rgba(16,185,129,0.3)" : "rgba(239,68,68,0.3)";
        ctx.fillStyle = "rgba(10, 15, 30, 0.75)";
        ctx.fillRect(0, H - 70, W, 70);
        ctx.fillStyle = modeColor;
        ctx.fillRect(0, H - 70, W, 70);

        ctx.strokeStyle = modeStroke;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, H - 70);
        ctx.lineTo(W, H - 70);
        ctx.stroke();

        for (var i = 0; i < bottomPlanted.length; i++) {
          var p = bottomPlanted[i];
          var px = p.x % (W - 100);
          var py = H - 35 - Math.floor(p.x / (W - 100)) * 50;

          ctx.font = "28px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          if (p.type === "tree") {
            if (p.stage < 4) ctx.fillText("🌱", px, py - 5);
            else if (p.stage < 8) ctx.fillText("🌿", px, py - 5);
            else {
              ctx.fillText("🌳", px, py - 5);
              ctx.shadowColor = "rgba(34,197,94,0.5)";
              ctx.shadowBlur = 10;
              ctx.fillText("🌳", px, py - 5);
              ctx.shadowBlur = 0;
            }

            if (p.stage < 10) {
              ctx.font = "9px Inter";
              ctx.fillStyle = "#10b981";
              ctx.fillText(p.stage + "/10", px, py + 18);
            } else {
              ctx.font = "10px Inter";
              ctx.fillStyle = "#10b981";
              ctx.fillText("-200kWh", px, py + 18);
            }
          } else {
            if (p.stage < 5) ctx.fillText("🏗️", px, py - 5);
            else {
              ctx.fillText("☢️", px, py - 5);
              ctx.shadowColor = "rgba(239,68,68,0.5)";
              ctx.shadowBlur = 15;
              ctx.fillText("☢️", px, py - 5);
              ctx.shadowBlur = 0;
            }

            if (p.stage < 10) {
              ctx.font = "9px Inter";
              ctx.fillStyle = "#ef4444";
              ctx.fillText(p.stage + "/10", px, py + 18);
            } else {
              ctx.font = "10px Inter";
              ctx.fillStyle = "#ef4444";
              ctx.fillText("+5kW GPU", px, py + 18);
            }
          }
        }
        ctx.globalAlpha = 1;
      }

      // LIVE prompt lifecycle tracker — COMPLETE journey with POAW + NI-Shield
      function updatePromptLive(fp, currentPhase) {
        var pp = document.getElementById("prompt-panel");
        var d = fp.data;
        var isBlk = d.status === "block";
        var blocked = fp._blocked;
        var flmName =
          document.getElementById("flm-select").selectedOptions[0].textContent;
        var lat = fp.latencies;

        var phases = ["shield", "compress", "audit"];
        var phaseIdx = phases.indexOf(currentPhase);

        function stg(
          phase,
          idx,
          label,
          emoji,
          activeColor,
          result,
          liveText,
          latencyMs,
        ) {
          var isActive = phaseIdx === idx;
          var isDone = phaseIdx > idx;
          var isWaiting = phaseIdx < idx;
          var color = isActive
            ? "#fbbf24"
            : isDone
            ? isBlk && idx === 0
              ? "#ef4444"
              : "#10b981"
            : "#374151";
          var text = isActive ? liveText : isDone ? result : "⧗ Waiting...";
          var badge = isActive
            ? ' <span style="color:#fbbf24;font-size:0.5rem">● LIVE</span>'
            : isDone
            ? ' <span style="color:#10b981;font-size:0.5rem">✓</span> <span style="font-size:0.45rem;opacity:0.6;font-family:JetBrains Mono">(' +
              latencyMs +
              "ms)</span>"
            : "";
          return (
            '<div class="stage" style="border-left:2px solid ' +
            color +
            ';padding-left:12px;margin-bottom:12px;padding-top:2px;padding-bottom:2px">' +
            '<div class="stage-title" style="color:' +
            color +
            ';margin-bottom:6px">' +
            emoji +
            " " +
            label +
            badge +
            "</div>" +
            '<div class="stage-text">' +
            text +
            "</div></div>"
          );
        }

        var poawHash =
          "sha3-" +
          Math.abs(hashCode(d.original)).toString(16).substring(0, 12);
        var poawBadge =
          phaseIdx >= 2
            ? ' <span style="color:#10b981;font-size:0.5rem">✓</span> <span style="font-size:0.45rem;opacity:0.6;font-family:JetBrains Mono">(' +
              lat.poaw +
              "ms)</span>"
            : "";
        var poawStatus =
          phaseIdx >= 2
            ? "⛓️ Merkle leaf #" + promptsSpawned + " accumulated"
            : "⧗ Pending...";

        var niShield = isBlk
          ? "🔴 BLOCKED — φ-coherence violated"
          : "🟢 ALIGNED — φ=" + (0.78 + Math.random() * 0.15).toFixed(3);

        var llmDoneBadge =
          phaseIdx >= 2
            ? ' <span style="color:#10b981;font-size:0.5rem">✓</span> <span style="font-size:0.45rem;opacity:0.6;font-family:JetBrains Mono">(' +
              lat.llm +
              "ms)</span>"
            : phaseIdx === 1
            ? ' <span style="color:#fbbf24;font-size:0.5rem">● LIVE</span>'
            : "";

        var inactiveBorder = "rgba(255,255,255,0.15)"; // Instead of #374151
        var inactiveTitle = "#94a3b8"; // Instead of #374151 or #475569

        document.getElementById("prompt-stages").innerHTML =
          '<div class="stage" style="border-left:2px solid #cbd5e1;padding-left:12px;margin-bottom:12px;padding-top:2px">' +
          '<div class="stage-title" style="color:#cbd5e1;margin-bottom:6px">📝 Original Prompt</div>' +
          '<div class="stage-text" style="color:#f8fafc;font-size:0.75rem">' +
          d.original +
          "</div></div>" +
          '<div style="font-size:0.45rem;color:#cbd5e1;margin:12px 0 8px 0;letter-spacing:1px;font-weight:800">─── LIFECYCLE STAGES ───</div>' +
          stg(
            "shield",
            0,
            "AEGIS Shield (62 layers)",
            "🛡️",
            "#ef4444",
            d.stages.shield,
            "⏳ Scanning through 62 wired layers...",
            lat.shield,
          ) +
          (blocked
            ? '<div class="stage" style="border-left:2px solid #ef4444;padding-left:12px;margin-bottom:12px"><div class="stage-title" style="color:#ef4444;margin-bottom:6px">✕ BLOCKED</div><div class="stage-text">' +
              d.stages.shield +
              "</div></div>"
            : "") +
          stg(
            "compress",
            1,
            "QFAI-C Compression",
            "🐚",
            "#2dd4bf",
            d.stages.compress,
            "⏳ φ-Fibonacci compressing...",
            lat.compress,
          ) +
          '<div class="stage" style="border-left:2px solid ' +
          (phaseIdx >= 1 ? "#fbbf24" : inactiveBorder) +
          ';padding-left:12px;margin-bottom:12px;padding-top:2px">' +
          '<div class="stage-title" style="color:' +
          (phaseIdx >= 1 ? "#fbbf24" : inactiveTitle) +
          ';margin-bottom:6px">🕳️ LLM Black Box' +
          llmDoneBadge +
          "</div>" +
          '<div class="stage-text">' +
          flmName +
          "</div></div>" +
          stg(
            "audit",
            2,
            "SIREN Audit (12D)",
            "🐬",
            "#7c3aed",
            d.stages.audit,
            "⏳ 12D alignment verification...",
            lat.audit,
          ) +
          '<div style="font-size:0.45rem;color:#cbd5e1;margin:12px 0 8px 0;letter-spacing:1px;font-weight:800">─── ATTESTATION ───</div>' +
          '<div class="stage" style="border-left:2px solid ' +
          (phaseIdx >= 2 ? "#a855f7" : inactiveBorder) +
          ';padding-left:12px;margin-bottom:12px;padding-top:2px">' +
          '<div class="stage-title" style="color:' +
          (phaseIdx >= 2 ? "#a855f7" : inactiveTitle) +
          ';margin-bottom:6px">🔐 POAW / AAQA' +
          poawBadge +
          "</div>" +
          '<div class="stage-text"><span style="font-family:JetBrains Mono;font-size:0.6rem;color:#cbd5e1">' +
          poawHash +
          "</span><br>" +
          poawStatus +
          "</div></div>" +
          '<div class="stage" style="border-left:2px solid ' +
          (phaseIdx >= 2 ? (isBlk ? "#ef4444" : "#22c55e") : inactiveBorder) +
          ';padding-left:12px;margin-bottom:12px;padding-top:2px">' +
          '<div class="stage-title" style="color:' +
          (phaseIdx >= 2 ? (isBlk ? "#ef4444" : "#22c55e") : inactiveTitle) +
          ';margin-bottom:6px">🧬 NI-Shield Status</div>' +
          '<div class="stage-text">' +
          niShield +
          "</div></div>";
        pp.classList.add("visible");
      }
      // Simple hash for POAW simulation
      function hashCode(s) {
        var h = 0;
        for (var i = 0; i < s.length; i++) {
          h = (h << 5) - h + s.charCodeAt(i);
          h |= 0;
        }
        return h;
      }

      requestAnimationFrame(render);
    </script>
  </body>
</html>
